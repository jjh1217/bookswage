<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookswage 통합 보안 관제 시스템</title>

    <!-- open graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://b2b.bookswage.com/admin">
    <meta property="og:title" content="bookswage 통합 보안 관제 시스템">
    <meta property="og:description" content="콘텐츠 보호, 사용자 인증, 데이터 유출 방지를 통합 관리하는 bookswage 보안 관제 시스템. 대시보드와 통계를 통해 운영 현황을 한눈에 확인하세요.">
    <meta property="og:image" content="https://b2b.bookswage.com/assets/img/sns_logo.png">

    <!-- favicon -->
    <link rel="icon" href="../assets/img/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/img/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/img/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/img/favicon/apple-touch-icon.png">
    <link rel="manifest" href="../assets/img/favicon/site.webmanifest">

    <!-- stylesheets -->
    <link rel="stylesheet" href="../assets/css/jquery-ui.min.css">
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/style.css">

    <!-- script -->
    <script type="text/javascript" src="./assets/js/jquery-3.7.1.min.js"></script>
    <script type="text/javascript" src="./assets/js/jquery-migrate-1.4.1.min.js"></script>
    <script type="text/javascript" src="./assets/js/jquery-ui.min.js"></script>
    <script type="text/javascript" src="./assets/js/common.js"></script>
</head>
<body>
    <div class="wrap">
        <header></header>

        <aside></aside>

        <main>
            <form action="#"  class="box_content">
                <section class="tit_box">
                    <h2>유출 탐지 캡쳐 프로그램 정보</h2>
                </section>
    
                <section class="box_item pt_0">
                    <div class="form_box line">
                        <fieldset class="form_field">
                            <legend>유출 탐지 캡쳐 프로그램 정보</legend>
                            <div class="form_row">
                                <label class="req">캡쳐 프로그램명</label>
                                <div class="form_item">
                                    <input type="text" placeholder="캡쳐 프로그램명을 입력하세요.">
                                </div>
                            </div>
                            <div class="form_row">
                                <label class="req">프로그램 프로세스 ID</label>
                                <div class="form_item">
                                    <input type="text" placeholder="프로그램 프로세스 ID를 입력하세요.">
                                </div>
                            </div>
                            <div class="form_row">
                                <label class="req">대상 OS</label>
                                <div class="chk_box">
                                    <label class="item">
                                        <input type="radio" name="os-chk" id="os-ok" checked>
                                        <span>사용</span>
                                    </label>
                                    <label class="item">
                                        <input type="radio" name="os-chk" id="os-no">
                                        <span>사용 안함</span>
                                    </label>
                                </div>
                            </div>
                            <div class="form_row">
                                <label class="req">탐지 상태</label>
                                <div class="chk_box">
                                    <label class="item">
                                        <input type="radio" name="detect-chk" id="detect-ok" checked>
                                        <span>사용</span>
                                    </label>
                                    <label class="item">
                                        <input type="radio" name="detect-chk" id="detect-no">
                                        <span>사용 안함</span>
                                    </label>
                                </div>
                            </div>
                        </fieldset>
                        <div class="btn_box">
                            <button type="button" class="btn gray confirm_open" data-type="cancel">취소</button>
                            <button type="button" class="btn primary confirm_open" data-type="insert">등록</button>
                        </div>
                    </div>
                </section>
            </form>
        </main>
    </div>
</body>
</html>
